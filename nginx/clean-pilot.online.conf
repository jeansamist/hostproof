# =============================================================================
# clean-pilot.online — Next.js Web App (port 5050)
#
# Install:
#   sudo cp nginx/clean-pilot.online.conf /etc/nginx/sites-available/clean-pilot.online
#   sudo ln -s /etc/nginx/sites-available/clean-pilot.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d clean-pilot.online -d www.clean-pilot.online
# =============================================================================

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream hostproof_web {
    server 127.0.0.1:5050;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name clean-pilot.online www.clean-pilot.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://clean-pilot.online$request_uri;
    }
}

# ── www → apex redirect ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.clean-pilot.online;

    ssl_certificate     /etc/letsencrypt/live/clean-pilot.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clean-pilot.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://clean-pilot.online$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clean-pilot.online;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/clean-pilot.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clean-pilot.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/clean-pilot.online.access.log;
    error_log  /var/log/nginx/clean-pilot.online.error.log;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─────────────────────────────────────────────────────────────────────────
    # Next.js static assets — cache aggressively (content-hashed filenames)
    # ─────────────────────────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://hostproof_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=31536000, immutable" always;

        gzip              on;
        gzip_types        text/css application/javascript application/json;
        gzip_min_length   1024;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Next.js image optimisation endpoint
    # ─────────────────────────────────────────────────────────────────────────
    location /_next/image {
        proxy_pass         http://hostproof_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400" always;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # All other requests → Next.js server
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://hostproof_web;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        gzip              on;
        gzip_types        text/html text/css application/javascript;
        gzip_min_length   1024;
    }
}
