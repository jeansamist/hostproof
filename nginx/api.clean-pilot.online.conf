# =============================================================================
# api.clean-pilot.online — AdonisJS API (port 1234)
#
# Install:
#   sudo cp nginx/api.clean-pilot.online.conf /etc/nginx/sites-available/api.clean-pilot.online
#   sudo ln -s /etc/nginx/sites-available/api.clean-pilot.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d api.clean-pilot.online
# =============================================================================

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream hostproof_api {
    server 127.0.0.1:1234;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.clean-pilot.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.clean-pilot.online;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.clean-pilot.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.clean-pilot.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api.clean-pilot.online.access.log;
    error_log  /var/log/nginx/api.clean-pilot.online.error.log;

    # ── Upload size (video recordings can easily exceed 100 MB) ─────────────
    client_max_body_size 512m;
    client_body_timeout  300s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "DENY"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─────────────────────────────────────────────────────────────────────────
    # SSE — AdonisJS Transmit  /__transmit/events
    # Long-lived connection: disable buffering, raise read timeout.
    # ─────────────────────────────────────────────────────────────────────────
    location /__transmit/ {
        proxy_pass         http://hostproof_api;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         '';   # keep-alive for upstream

        # SSE-critical: no buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;   # 1 hour — keep SSE streams alive
        proxy_send_timeout     3600s;

        # Tell Nginx (and any intermediate cache) not to buffer this response
        add_header X-Accel-Buffering "no" always;

        # SSE streams must not be gzip-compressed
        gzip off;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Static files served by AdonisJS (public/)
    # ─────────────────────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://hostproof_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache uploaded files aggressively at the CDN/browser level
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800, immutable" always;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # All other API requests
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://hostproof_api;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Compress JSON / text responses
        gzip              on;
        gzip_types        text/css application/javascript;
        gzip_min_length   1024;
    }
}
